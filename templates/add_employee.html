{% extends "base.html" %}
{% block title %}Add Employee — NexHR{% endblock %}
{% block page_title %}Add New Employee{% endblock %}
{% block content %}
<div class="panel" style="max-width:700px">
    <div class="panel-header"><h3>◉ New Employee Registration</h3></div>
    <div class="panel-body">
        <form method="POST" class="form-section" style="max-width:100%">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="john@company.com">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Department</label>
                    <select name="department" required>
                        <option value="">Select department</option>
                        <option>Engineering</option><option>Design</option><option>Marketing</option>
                        <option>Sales</option><option>Finance</option><option>HR</option><option>Operations</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Designation</label>
                    <input type="text" name="designation" required placeholder="Software Engineer">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Salary (USD)</label>
                    <input type="number" name="salary" required min="0" placeholder="75000">
                </div>
                <div class="form-group">
                    <label>Performance Score (0-100)</label>
                    <input type="number" name="performance_score" min="0" max="100" value="75" required>
                </div>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="+1 (555) 000-0000">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" rows="2" placeholder="Employee address..."></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">◉ Register Employee</button>
                <a href="{{ url_for('admin.view_employees') }}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
