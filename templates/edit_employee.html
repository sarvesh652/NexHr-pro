{% extends "base.html" %}
{% block title %}Edit Employee{% endblock %}
{% block page_title %}Edit Employee{% endblock %}

{% block content %}
<div style="max-width:760px;margin:0 auto;">
<div class="panel">
    <div class="panel-header"><h3>Edit: {{ employee.name }}</h3></div>
    <div class="panel-body">
        <form method="POST" class="emp-form grid-2col">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" required value="{{ employee.name }}">
            </div>
            <div class="form-group">
                <label>Email (read-only)</label>
                <input type="email" value="{{ employee.email }}" disabled style="opacity:.6;">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ employee.phone or '' }}">
            </div>
            <div class="form-group">
                <label>Department *</label>
                <select name="department" required>
                    {% for dept in ['Engineering','Marketing','Sales','HR','Finance'] %}
                    <option {% if employee.department == dept %}selected{% endif %}>{{ dept }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Designation *</label>
                <input type="text" name="designation" required value="{{ employee.designation }}">
            </div>
            <div class="form-group">
                <label>Salary ($) *</label>
                <input type="number" name="salary" required value="{{ employee.salary }}" min="0">
            </div>
            <div class="form-group">
                <label>Years of Experience</label>
                <input type="number" name="experience_years" value="{{ employee.experience_years or 0 }}" min="0" max="40">
            </div>
            <div class="form-group">
                <label>Performance Score (0-100)</label>
                <input type="number" name="performance_score" value="{{ employee.performance_score }}" min="0" max="100">
            </div>
            <div class="form-group">
                <label>Task Completion % (0-100)</label>
                <input type="number" name="task_completion" value="{{ employee.task_completion or 70 }}" min="0" max="100">
            </div>
            <div class="form-group" style="grid-column:1/-1;display:flex;gap:1rem;justify-content:flex-end;">
                <a href="{{ url_for('admin.view_employees') }}" class="btn-outline">Cancel</a>
                <button type="submit" class="btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
